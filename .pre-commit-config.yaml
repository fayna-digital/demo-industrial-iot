# Pre-commit hooks — demo-industrial-iot. Pinned tool versions live in this
# file, so any clone reproduces the full quality gate with no manual installs:
#   uvx pre-commit run --all-files      # zero-install (uv fetches everything)
# or, once installed:
#   pre-commit install && pre-commit install --hook-type commit-msg

repos:
  # Lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Types
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^(src|config)/

  # Security: secret scanner
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # Fayna policy: no AI co-author signature (content + commit message)
  - repo: local
    hooks:
      - id: no-ai-signature
        name: No AI co-author signature (file content)
        entry: python3 scripts/check_no_ai_signature.py
        language: system
        pass_filenames: true
        exclude: ^scripts/check_no_ai_signature\.py$
      - id: no-ai-signature-msg
        name: No AI co-author signature (commit message)
        entry: python3 scripts/check_no_ai_signature.py
        language: system
        stages: [commit-msg]
